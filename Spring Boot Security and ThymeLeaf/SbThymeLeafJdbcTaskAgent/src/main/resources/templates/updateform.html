<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
<meta charset="ISO-8859-1">
<title>Agent Management System</title>

<link rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>Agent Management System</h1>
        <hr>
        <h2>Update Agent</h2>

        <form action="#" th:action="@{/saveagent}" th:object="${agent}"
            method="POST">
            
            <!-- Add hidden form field to handle update -->
            <input type="hidden" th:field="*{agentid}" />
            
            <input type="text" th:field="*{name}" class="form-control mb-4 col-4">
                                    
                <input type="text" th:field="*{city}" class="form-control mb-4 col-4">
                  <input type="text" th:field="*{gender}" class="form-control mb-4 col-4">
                    <input type="text" th:field="*{maritalstatus}" class="form-control mb-4 col-4">
                      <input type="text" th:field="*{premium}" class="form-control mb-4 col-4">
                
                <button type="submit" class="btn btn-info col-2"> Update Agent</button>
        </form>
        
        <hr>
        
        <a th:href = "@{/}"> Back to Agent List</a>
    </div>
</body>
</html>
