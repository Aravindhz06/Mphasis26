
<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
<meta charset="ISO-8859-1">
<title>Agent Management System</title>
<link rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
    crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h1>Agent Management System</h1>
        <hr>
        <h2>Save Agent</h2>

        <form action="#" th:action="@{/savenew}" th:object="${agent}"
            method="POST">
            <input type="number" th:field="*{agentid}" 
            	placeholder="Agent No"
                class="form-control mb-4 col-4"> 
                
                <input type="text"
                th:field="*{name}" placeholder="Agent Name"
                class="form-control mb-4 col-4">
                
            <input type="text" th:field="*{city}" 
            	placeholder="Agent's City"
                class="form-control mb-4 col-4">
                 
				<input type="text" th:field="*{gender}" 
				placeholder="Agent's Gender"
				class="form-control mb-4 col-4">
            
            <input type="text" th:field="*{maritalstatus}" 
            	placeholder="MaritalStatus"
                class="form-control mb-4 col-4"> 
				
                <input type="number"
                th:field="*{premium}" placeholder="Premium "
                class="form-control mb-4 col-4">

            <button type="submit" class="btn btn-info col-2">Save
                Agent</button>
        </form>

        <hr>

        <a th:href="@{/}"> Back to Employee List</a>
    </div>
</body>
</html>
