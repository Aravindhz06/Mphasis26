<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
<meta charset="ISO-8859-1">
<title>Agent</title>
<link rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
    crossorigin="anonymous">
</head>
<body bgcolor="orange">
<div class="container my-2" align="center">

<h3>Agent List</h3>
<a th:href="@{/addagent}" class="btn btn-primary btn-sm mb-3" >Add Agent</a>
    <table style="width:80%" border="1" 
           class = "table table-striped table-responsive-md">
    <thead>
  <tr>
    <th>Agent Id</th>
    <th>Name</th>
    <th>City</th>
    <th>Gender</th>
    <th>Marital Status</th>
    <th>Premium</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="agent:${agentList}">
      <td th:text="${agent.agentid}"></td>
      <td th:text="${agent.name}"></td>
      <td th:text="${agent.city}"></td>
      <td th:text="${agent.gender}"></td>
      <td th:text="${agent.maritalstatus}"></td>
        <td th:text="${agent.premium}"></td>
        <td> <a th:href="@{/updateform/{agentid}(agentid=${agent.agentid})}" 
                class="btn btn-primary">Update</a> 
                <a th:href="@{/deleteagent/{agentid}(agentid=${agent.agentid})}"
                class="btn btn-danger">Delete</a>
    </td>
  </tr>
  </tbody>
</table>
</div>
</body>
</html>
